
services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:latest}
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres_db_backend}
    restart: ${RESTART_POLICY:-always}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verYs3cret}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-trust}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - my_network

  redis:
    image: ${REDIS_IMAGE:-redis:latest}
    container_name: ${REDIS_CONTAINER_NAME:-redis_container}
    restart: ${RESTART_POLICY:-always}
    ports:
      - "${REDIS_PORT:-6379}:6379"
#    command: redis-server --requirepass redisPd
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redisPd}
    networks:
      - my_network

  zookeeper:
    image: ${ZOOKEEPER_IMAGE:-confluentinc/cp-zookeeper:7.2.1}
    container_name: ${ZOOKEEPER_CONTAINER_NAME:-zookeeper}
    restart: ${RESTART_POLICY:-always}
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT:-2181}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME:-2000}
      ZOOKEEPER_SYNC_LIMIT: ${ZOOKEEPER_SYNC_LIMIT:-2}
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    networks:
      - my_network

  kafka:
    image: ${KAFKA_IMAGE:-confluentinc/cp-kafka:7.2.1}
    container_name: ${KAFKA_CONTAINER_NAME:-kafka}
    restart: ${RESTART_POLICY:-always}
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID:-1}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT:-zookeeper:2181}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_ADVERTISED_HOST:-kafka}:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
#      KAFKA_BROKER_ID: 1
#      KAFKA_ZOOKEEPER_CONNECT: localhost:2181
#      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
#      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:-1}
    networks:
      - my_network

