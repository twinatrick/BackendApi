##      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
##      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-verYs3cret}
##      REDIS_HOST: redis
##      REDIS_PORT: 6379
##      REDIS_PASSWORD: ${REDIS_PASSWORD:-redisPd}
##      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
##      APP_IN_DOCKER: "true"
##    networks:
##      - my_network
  etcd:
    image: ${ETCD_IMAGE:-quay.io/coreos/etcd:v3.5.9}
    container_name: ${ETCD_CONTAINER_NAME:-gary-backend-etcd}
    restart: ${RESTART_POLICY:-always}
    command:
      - /usr/local/bin/etcd
      - --advertise-client-urls
      - http://0.0.0.0:2379
      - --listen-client-urls
      - http://0.0.0.0:2379
      - --data-dir
      - /etcd-data
    volumes:
      - etcd_data:/etcd-data
    networks:
      - my_network

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: ${MINIO_CONTAINER_NAME:-gary-backend-minio}
    restart: ${RESTART_POLICY:-always}
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - my_network

  milvus:
    image: milvusdb/milvus:${MILVUS_VERSION:-v2.4.5}
    container_name: ${MILVUS_CONTAINER_NAME:-gary-backend-milvus}
    restart: ${RESTART_POLICY:-always}
    depends_on:
      - postgres
      - etcd
      - minio
    environment:
      MILVUS_DEPLOY_MODE: standalone
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      COMMON_META_BACKEND: postgresql
      POSTGRES_HOST: ${MILVUS_POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${MILVUS_POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verYs3cret}
      POSTGRES_DB_NAME: ${POSTGRES_DB:-postgres}

      # ========= Milvus 身份驗證設定 =========
      # 啟用帳號密碼登入
      # MILVUS_ENABLE_AUTH: "true"
      # 管理員帳號與密碼
      # MILVUS_ROOT_USER: ${MILVUS_ROOT_USER}
      # MILVUS_ROOT_PASSWORD: ${MILVUS_ROOT_PASSWORD}
      # 啟用 Token 驗證（選擇性）
      MILVUS_AUTH_TOKEN: ${MILVUS_TOKEN:-milvus-default-token}
      MILVUS_AUTH_TOKEN_ENABLED: "true"
      MILVUS_AUTH_TOKEN_EXPIRATION: "3600" # Token 1 小時有效
      # =====================================

    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_HEALTH_PORT:-9091}:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - my_network
    command: [ "milvus", "run", "standalone" ]

  nacos:
    image: nacos/nacos-server:v2.5.1
    container_name: nacos-server
    restart: ${RESTART_POLICY:-always}
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - my_network

  attu:
    image: ${ATTU_IMAGE:-zilliz/attu:latest}
    container_name: ${ATTU_CONTAINER_NAME:-gary-backend-attu}
    restart: ${RESTART_POLICY:-always}
    depends_on:
      - milvus
    environment:
      # 設定要連接的 Milvus 伺服器
      MILVUS_URL: milvus:19530

      # 如果 Milvus 啟用了帳號密碼，Attu 也要設定登入資訊
      MILVUS_USER: ${MILVUS_ROOT_USER:-root}
      MILVUS_PASSWORD: ${MILVUS_ROOT_PASSWORD:-Milvus}
    ports:
      - "${ATTU_PORT:-8002}:3000"
    networks:
      - my_network
volumes:
  postgres_data:
  milvus_data:
  etcd_data:
  minio_data:

networks:
  my_network:
    driver: bridge
