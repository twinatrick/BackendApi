jwt:
  secret:
    use: ${JWT_SECRET_USE:secretsecretsecretsecretsecretll}
  issuer: ${JWT_ISSUER:backedApi}
  audience: ${JWT_AUDIENCE:backedApi}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

app:
  in-docker: ${APP_IN_DOCKER:false}

spring:
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:verYs3cret}
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
server:
  port: ${SERVER_PORT:8000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: backend-architecture-lab
    enable:
      redis: true
      cache: true

kafka:
  consumer:
    group-id: ${KAFKA_CONSUMER_GROUP_ID:myGroup}

cache:
  bloom-filter:
    default-expected-insertions: 10000
    default-false-probability: 0.001
    overrides:
      users:
        expected-insertions: 50000
        false-probability: 0.001
      skills:
        expected-insertions: 50000
        false-probability: 0.001
  ttl-jitter:
    max-offset: 0.3

redis:
  cache:
    ttl-hours: ${REDIS_CACHE_TTL_HOURS:1}

superuser:
  key: ${SUPERUSER_KEY:genAdminKey}

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}
    model: ${GEMINI_MODEL:gemini-2.0-flash}

deepseek:
  api:
    key: ${DEEPSEEK_API_KEY:}
    url: ${DEEPSEEK_API_URL:https://api.deepseek.com/chat/completions}
    model: ${DEEPSEEK_MODEL:deepseek-v4-flash}

groq:
  api:
    key: ${GROQ_API_KEY:}
    url: ${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
    model: ${GROQ_MODEL:llama-3.3-70b-versatile}

github:
  models:
    api:
      key: ${GITHUB_MODELS_API_KEY:}
      url: ${GITHUB_MODELS_API_URL:https://models.inference.ai.azure.com/chat/completions}
      model: ${GITHUB_MODELS_MODEL:gpt-4o-mini}

ai:
  whisper:
    model-path: ${WHISPER_MODEL_PATH:models/ggml-large-v3-turbo.bin}
