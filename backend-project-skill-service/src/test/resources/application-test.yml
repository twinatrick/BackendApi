app:
  init:
    enabled: false

spring:
  autoconfigure:
    exclude: org.redisson.spring.starter.RedissonAutoConfigurationV2
  redis:
    host: localhost
    port: 6379

  # 測試環境數據庫配置 - 使用內存 H2 數據庫
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=KEY
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: create-drop  # 每次測試開始時創建表,結束時刪除
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect

  # H2 控制台配置(可選)
  h2:
    console:
      enabled: true
      path: /h2-console

# 日誌配置
logging:
  level:
    com.example.BackendArchitectureLab: DEBUG
    org.springframework.test: INFO
