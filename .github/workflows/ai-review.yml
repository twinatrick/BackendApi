name: "CI Flow: Push Summary & MR Review"

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    types: [opened, synchronize]

jobs:
  # === 任務一：Push 時自動生成實作說明 ===
  push-summary:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate Summary Report
        run: |
          echo "## 📊 📊 程式碼提交自動說明報告" > report.md
          echo "* **提交人員:** ${{ github.actor }}" >> report.md
          echo "* **提交訊息 (實作內容):** $(git log -1 --pretty=format:'%s')" >> report.md
          
          echo "### 📂 本次修改的檔案清單：" >> report.md
          echo "\`\`\`diff" >> report.md
          git diff --name-status HEAD~1 HEAD >> report.md
          echo "\`\`\`" >> report.md

          cat report.md >> $GITHUB_STEP_SUMMARY

  # === 任務二：Merge Request AI 審查 ===
  mr-ai-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # 💡 沿用你網頁上設定的 apikey 環境
    environment: apikey
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch for diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Run AI Review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PYTHON_CODE: |
            import os
            import requests

            def main():
                groq_key = os.environ.get('GROQ_API_KEY')
                github_token = os.environ.get('GITHUB_TOKEN')
                repo = os.environ.get('REPO')
                pr_num = os.environ.get('PR_NUMBER')

                if not os.path.exists('patch.diff'):
                    print("找不到 patch.diff")
                    return

                with open('patch.diff', 'r', encoding='utf-8') as f:
                    diff = f.read()

                if not diff.strip():
                    print("Diff 內容為空，跳過")
                    return

                # 💡 稍微放寬截斷線至 30,000 字元，確保 AI 能看到足夠的上下文
                if len(diff) > 30000:
                    diff = diff[:30000] + "\n\n...(內容過長已自動截斷，以符合 Groq 免費額度限制)..."

                prompt = f"""請擔任嚴格且精準的資深 Java/Spring Boot 工程師，進行 Code Review。

                【🚨 Git Diff 閱讀守則 (極度重要)】
                1. Git Diff 中以 `+` 開頭的行是「新增的程式碼」，以 `-` 開頭的是「刪除的」，以空白開頭的行是「原有的上下文」。
                2. 盲目建議 (Blind Advice)：在給建議前，請仔細看清楚 Diff 的綠字(+)與白字(上下文)！
                   - 若 `+` 或上下文已經處理了某邏輯（例如已有重試限制、已有 `log.error(...)` 記錄異常、資源有被正確關閉），**絕對禁止**你再無中生有指責它沒處理！看清楚再回答！

                【🚨 絕對禁止的行為 (Critical Rules)】
                1. 拒絕架構干涉：尊重原作者的設計。例如：若已實作合法且有效的原生機制（如原生 `for` 迴圈重試、Switch 封裝），**絕對禁止**要求強行導入其他第三方依賴（如 Spring `@Retry` 或 Apache Nutch），不要為了建議而建議。
                2. 錯誤的安全認知：`.env` 本就是用來注入本地機密變數的，**絕對禁止**抱怨「不要把密碼放在 .env」。

                【Review 核心要求】
                1. 只挑出真正的資安漏洞、潛在的 NullPointerException 或效能瓶頸。
                2. 若要給優化建議，必須給出「具體可執行的 Java 程式碼範例」。
                3. 若程式碼品質良好，沒有明顯漏洞，請直接在「必須修正」與「建議優化」區塊填寫「無」，切勿為了湊字數而無病呻吟。

                【回覆格式要求】
                ### 📝 MR 總結
                (2-3句話精簡說明)

                ### 🔴 必須修正 (Critical Issues)
                (若無請寫「無」。若有，必須說明邏輯錯誤並附上修正 Code Snippet)

                ### 🟡 建議優化 (Suggestions)
                (若無請寫「無」。若有，請附上優化 Code Snippet)

                ### 🟢 亮點與肯定 (Good Practices)
                (指出寫得好的防禦性設計)

                ---
                以下是 Git Diff 內容：
                ```diff
                {diff}
                ```"""
                headers = {'Authorization': f'Bearer {groq_key}', 'Content-Type': 'application/json'}
            
                # 雙模型防禦：首選現役最新的 3.3，備援 3.1
                models_to_try = ['llama-3.3-70b-versatile', 'llama-3.1-8b-instant']
                response = None
            
                for model in models_to_try:
                    print(f"正在嘗試呼叫 Groq API，使用模型: {model}...")
                    data = {'model': model, 'messages': [{'role': 'user', 'content': prompt}], 'temperature': 0.2}
                    try:
                        res = requests.post('https://api.groq.com/openai/v1/chat/completions', headers=headers, json=data)
                        if res.status_code == 200:
                            response = res
                            print(f"🎉 成功使用模型 {model} 取得回應！")
                            break
                        else:
                            print(f"❌ 模型 {model} 失敗，錯誤訊息: {res.text}")
                    except Exception as e:
                        print(f"💥 請求引發異常: {str(e)}")

                if not response:
                    print("🚨 抱歉，所有準備的 Groq 模型皆無法使用。")
                    return

                ai_reply = response.json()['choices'][0]['message']['content']
            
                print("正在留言到 GitHub...")
                gh_headers = {'Authorization': f'token {github_token}', 'Accept': 'application/vnd.github.v3+json'}
                gh_res = requests.post(f'https://api.github.com/repos/{repo}/issues/{pr_num}/comments', headers=gh_headers, json={'body': ai_reply})
                print(f"GitHub 回應狀態碼: {gh_res.status_code}")

            if __name__ == '__main__':
                main()
        run: |
          git diff origin/${{ github.event.pull_request.base.ref }} HEAD -- . ':(exclude)*.json' ':(exclude)*.lock' ':(exclude).github/*' > patch.diff
          echo "$PYTHON_CODE" > review.py
          python3 review.py