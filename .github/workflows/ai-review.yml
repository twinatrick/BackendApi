name: "CI Flow: Push Summary & MR Review"

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    types: [opened, synchronize]

jobs:
  # === 任務一：Push 時自動生成實作說明 (保持免費純 Git) ===
  push-summary:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate Summary Report
        run: |
          echo "## 📊 程式碼提交自動說明報告" > report.md
          echo "* **提交人員:** ${{ github.actor }}" >> report.md
          echo "* **提交訊息 (實作內容):** $(git log -1 --pretty=format:'%s')" >> report.md
          
          echo "### 📂 本次修改的檔案清單：" >> report.md
          echo "\`\`\`diff" >> report.md
          git diff --name-status HEAD~1 HEAD >> report.md
          echo "\`\`\`" >> report.md

          cat report.md >> $GITHUB_STEP_SUMMARY

  # === 任務二：Merge Request AI 審查 (更換穩定的新套件) ===
  mr-ai-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # 讓 AI 可以回覆 MR

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 抓取完整歷史，利於新套件精準比對

      - name: Free AI Code Review
        # 💡 更換為結構更嚴謹的新套件
        uses: ci-actions/ai-codereview@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 這裡同樣帶入你設定在 Secrets 的 Groq 金鑰
          OPENAI_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_BASE_URL: "https://api.groq.com/openai/v1"
          # 設定要使用的模型與語言
          MODEL: "llama3-70b-8192"
          LANGUAGE: "Traditional Chinese" # 繁體中文