name: "Free AI Code Review & Summary"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Free AI Code Review
        # 使用支援自訂 Base URL / OpenAI 相容格式的 Review 套件
        uses: anc95/ChatGPT-CodeReview@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 將 Groq 的 API 偽裝成 OpenAI 格式傳入
          OPENAI_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_BASE: "https://api.groq.com/openai/v1"
          MODEL: "llama3-70b-8192" # 使用免費的高級開源模型
          LANGUAGE: "Zh-TW"