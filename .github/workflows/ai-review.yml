name: "CI Flow: Push Summary & MR Review"

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    types: [opened, synchronize]

jobs:
  # === 任務一：Push 時自動生成實作說明 ===
  push-summary:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate Summary Report
        run: |
          echo "## 📊 📊 程式碼提交自動說明報告" > report.md
          echo "* **提交人員:** ${{ github.actor }}" >> report.md
          echo "* **提交訊息 (實作內容):** $(git log -1 --pretty=format:'%s')" >> report.md
          
          echo "### 📂 本次修改的檔案清單：" >> report.md
          echo "\`\`\`diff" >> report.md
          git diff --name-status HEAD~1 HEAD >> report.md
          echo "\`\`\`" >> report.md

          cat report.md >> $GITHUB_STEP_SUMMARY

  # === 任務二：Merge Request AI 審查 ===
  mr-ai-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # 💡 沿用你網頁上設定的 apikey 環境
    environment: apikey
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch for diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Run AI Review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PYTHON_CODE: |
            import os
            import requests

            def main():
                groq_key = os.environ.get('GROQ_API_KEY')
                github_token = os.environ.get('GITHUB_TOKEN')
                repo = os.environ.get('REPO')
                pr_num = os.environ.get('PR_NUMBER')

                if not os.path.exists('patch.diff'):
                    print("找不到 patch.diff")
                    return

                with open('patch.diff', 'r', encoding='utf-8') as f:
                    diff = f.read()

                if not diff.strip():
                    print("Diff 內容為空，跳過")
                    return

                # 💡 關鍵修正：將安全截斷線降到 15,000 字元，徹底確保不塞爆 Groq 的 TPM 免費額度限制！
                if len(diff) > 15000:
                    diff = diff[:15000] + "\n\n...(內容過長已自動截斷，以符合 Groq 免費額度限制)..."

                prompt = f"""請擔任高階資深 Java/Spring Boot 軟體工程師，為以下的程式碼改動（Git Diff）進行精準且具體的 Code Review，並使用繁體中文回覆。

                【Review 核心守則】
                1. 拒絕幻覺 (No Hallucination)：請嚴格根據 Diff 內容評論。若程式碼已處理了某種情況（如已經有重試上限、已有防呆或例外處理），切勿無中生有指責其未處理。
                2. 提供具體範例 (Concrete Examples)：提出修改建議時，必須給出「具體且可執行的程式碼範例 (Code Snippet)」，絕不能只給籠統的文字建議。
                3. 關注真實風險：專注於 Spring Boot 最佳實踐、效能瓶頸、資安與防禦性設計。
                4. 肯定優良設計：如果改動很完整、設計得當，請不要為了 Review 而硬挑骨頭，直接給予肯定即可。
                
                【回覆格式要求】
                請使用以下 Markdown 結構回覆：
                
                ### 📝 MR 總結
                (用 2-3 句話精簡說明本次改動核心)
                
                ### 🔴 必須修正 (Critical Issues / Bugs)
                (致命錯誤、資安漏洞或嚴重效能問題。若無請寫「無」。必須指明錯誤邏輯並附上「修正程式碼範例」)
                
                ### 🟡 建議優化 (Suggestions & Refactoring)
                (可提升可讀性、擴充性或型別安全的建議。請附上「優化後的程式碼對比範例」)
                
                ### 🟢 亮點與肯定 (Good Practices)
                (指出寫得不錯的防禦性設計或架構設計)
                
                ---
                以下是本次提交的 Git Diff 內容：
                ```diff
                {diff}
                ```"""
                headers = {'Authorization': f'Bearer {groq_key}', 'Content-Type': 'application/json'}
            
                # 雙模型防禦：首選現役最新的 3.3，備援 3.1
                models_to_try = ['llama-3.3-70b-versatile', 'llama-3.1-8b-instant']
                response = None
            
                for model in models_to_try:
                    print(f"正在嘗試呼叫 Groq API，使用模型: {model}...")
                    data = {'model': model, 'messages': [{'role': 'user', 'content': prompt}], 'temperature': 0.2}
                    try:
                        res = requests.post('https://api.groq.com/openai/v1/chat/completions', headers=headers, json=data)
                        if res.status_code == 200:
                            response = res
                            print(f"🎉 成功使用模型 {model} 取得回應！")
                            break
                        else:
                            print(f"❌ 模型 {model} 失敗，錯誤訊息: {res.text}")
                    except Exception as e:
                        print(f"💥 請求引發異常: {str(e)}")

                if not response:
                    print("🚨 抱歉，所有準備的 Groq 模型皆無法使用。")
                    return

                ai_reply = response.json()['choices'][0]['message']['content']
            
                print("正在留言到 GitHub...")
                gh_headers = {'Authorization': f'token {github_token}', 'Accept': 'application/vnd.github.v3+json'}
                gh_res = requests.post(f'https://api.github.com/repos/{repo}/issues/{pr_num}/comments', headers=gh_headers, json={'body': ai_reply})
                print(f"GitHub 回應狀態碼: {gh_res.status_code}")

            if __name__ == '__main__':
                main()
        run: |
          git diff origin/${{ github.event.pull_request.base.ref }} HEAD -- . ':(exclude)*.json' ':(exclude)*.lock' ':(exclude).github/*' > patch.diff
          echo "$PYTHON_CODE" > review.py
          python3 review.py