name: "CI Flow: Push Summary & MR Review"

on:
  # 1. 綁定 Push 事件（產出免費說明報告）
  push:
    branches: [ "master", "main" ]

  # 2. 綁定 Merge Request (Pull Request) 事件（觸發 AI 審查）
  pull_request:
    types: [opened, synchronize]

jobs:
  # ==========================================
  # 任務一：Push 時自動生成實作說明 (100% 免費)
  # ==========================================
  push-summary:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate Summary Report
        run: |
          echo "## 📊 程式碼提交自動說明報告" > report.md
          echo "* **提交人員:** ${{ github.actor }}" >> report.md
          echo "* **提交訊息 (實作內容):** $(git log -1 --pretty=format:'%s')" >> report.md
          
          echo "### 📂 本次修改的檔案清單：" >> report.md
          echo "\`\`\`diff" >> report.md
          git diff --name-status HEAD~1 HEAD >> report.md
          echo "\`\`\`" >> report.md

          cat report.md >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # 任務二：Merge Request 時執行免費 AI Code Review
  # ==========================================
  mr-ai-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Free AI Code Review
        uses: anc95/ChatGPT-CodeReview@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 這裡使用前面提到的 Groq 免費 API Key，記得要去 Settings 填寫
          OPENAI_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_BASE: "https://api.groq.com/openai/v1"
          MODEL: "llama3-70b-8192"
          LANGUAGE: "Zh-TW"