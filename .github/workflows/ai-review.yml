name: "CI Flow: Push Summary & MR Review"

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    types: [opened, synchronize]

jobs:
  # === 任務一：Push 報告 ===
  push-summary:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate Summary Report
        run: |
          echo "## 📊 程式碼提交自動說明報告" > report.md
          echo "* **提交人員:** ${{ github.actor }}" >> report.md
          echo "* **提交訊息 (實作內容):** $(git log -1 --pretty=format:'%s')" >> report.md
          
          echo "### 📂 本次修改的檔案清單：" >> report.md
          echo "\`\`\`diff" >> report.md
          git diff --name-status HEAD~1 HEAD >> report.md
          echo "\`\`\`" >> report.md

          cat report.md >> $GITHUB_STEP_SUMMARY

  # === 任務二：Merge Request AI 審查（修正版）===
  mr-ai-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read      # 💡 關鍵：加上這一行，允許套件讀取變數狀態以解除 403 錯誤

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Free AI Code Review
        uses: anc95/ChatGPT-CodeReview@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_BASE: "https://api.groq.com/openai/v1"
          MODEL: "llama3-70b-8192"
          LANGUAGE: "Zh-TW"